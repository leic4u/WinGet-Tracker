name: Debug‑GitHub‑Token‑Permissions
on:
  workflow_dispatch:   # 手动触发
permissions:
  contents: write      # 必须在 workflow 顶部声明
jobs:
  debug:
    runs-on: windows-latest          # 你目前用的是 Windows
    steps:
      - uses: actions/checkout@v3
        with:
          persist-credentials: true   # 不要关闭
      - name: Print runner OS
        run: echo "OS = ${{ runner.os }}"
      # ---------- 1️⃣ 检查 GITHUB_TOKEN ----------
      - name: Show token scopes (GITHUB_TOKEN)
        shell: pwsh
        run: |
          $Env:GITHUB_TOKEN = "${{ secrets.GITHUB_TOKEN }}"
          $response = Invoke-RestMethod -Uri "https://api.github.com/" `
              -Method GET `
              -Headers @{
                "Authorization" = "token $Env:GITHUB_TOKEN";
                "Accept"        = "application/vnd.github+json"
              } `
              -StatusCodeVariable status
          Write-Host "HTTP status: $status"
          if ($null -eq $response) {
            Write-Warning "Response null – token likely invalid"
          } else {
            $response.permissions | ConvertTo-Json -Depth 2 | Write-Host
          }
      # ---------- 2️⃣（可选）检查自建 PAT ----------
      - name: Show token scopes (PAT, optional)
        if: ${{ false }}   # 改成 true 启用
        shell: pwsh
        run: |
          $pat = "${{ secrets.MY_PAT }}"
          $response = Invoke-RestMethod -Uri "https://api.github.com/" `
              -Headers @{
                "Authorization" = "token $pat";
                "Accept"        = "application/vnd.github+json"
              } `
              -StatusCodeVariable status
          Write-Host "PAT HTTP status: $status"
          if ($null -eq $response) {
            Write-Warning "PAT response null – check PAT scopes"
          } else {
            $response.permissions | ConvertTo-Json -Depth 2 | Write-Host
          }
      # ---------- 3️⃣ 真正的创建 Ref ----------
      - name: Try to create a ref via API (fallback)
        shell: pwsh
        run: |
          $sha = "${{ github.sha }}"
          $ref = "refs/heads/debug-${{ github.run_id }}"
          $payload = @{
            ref = $ref
            sha = $sha
          } | ConvertTo-Json -Depth 2
          $create = Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/git/refs" `
              -Method POST `
              -Headers @{
                "Authorization" = "token $Env:GITHUB_TOKEN";
                "Accept"        = "application/vnd.github+json"
              } `
              -Body $payload `
              -StatusCodeVariable createStatus
          Write-Host "CreateRef HTTP status: $createStatus"
          if ($createStatus -ne 201) {
            Write-Error "CreateRef failed – see previous logs."
          } else {
            Write-Host "Ref created: $ref"
          }
